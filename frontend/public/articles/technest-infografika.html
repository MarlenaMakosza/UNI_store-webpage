<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechNest Infografika</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: transparent;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .pdf-wrapper {
        width: 100%;
        max-width: 1400px;
        margin: 0 auto;
      }

      .pdf-container {
        width: 100%;
        height: 1000px;
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(139, 92, 246, 0.3);
      }

      .pdf-container embed {
        width: 100%;
        height: 100%;
        border: none;
      }

      @media (max-width: 768px) {
        .pdf-container {
          height: 600px;
        }
      }
    </style>
  </head>
  <body>
    <div class="pdf-wrapper">
      <div class="pdf-container">
        <embed
          src="/images/technest-infografika.pdf"
          type="application/pdf"
          width="100%"
          height="100%"
        />
      </div>
    </div>
  </body>
</html>
