# Nginx configuration for marlenamakosza.com
# Place this in /etc/nginx/sites-available/marlenamakosza.com

server {
    listen 80;
    listen [::]:80;
    server_name marlenamakosza.com www.marlenamakosza.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name marlenamakosza.com www.marlenamakosza.com;

    # SSL Configuration (update paths to your certificates)
    ssl_certificate /etc/letsencrypt/live/marlenamakosza.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marlenamakosza.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Rate limiting zone for admin panel (protect against brute force)
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=5r/m;

    # Strapi Admin Panel - /projects/internet-marketing/admin
    location /projects/internet-marketing/admin {
        # Rate limiting - max 5 requests per minute
        limit_req zone=admin_limit burst=10 nodelay;

        # Optional: Uncomment to restrict by IP (add your home/work IPs)
        # allow 123.456.789.0;  # Your home IP
        # deny all;

        # Rewrite path to remove /projects/internet-marketing prefix for Strapi
        rewrite ^/projects/internet-marketing/(.*)$ /$1 break;

        proxy_pass http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Strapi API - /projects/internet-marketing/api
    location /projects/internet-marketing/api {
        # Rewrite path to remove /projects/internet-marketing prefix
        rewrite ^/projects/internet-marketing/(.*)$ /$1 break;

        proxy_pass http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # CORS headers for API
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    }

    # Strapi Uploads - /projects/internet-marketing/uploads
    location /projects/internet-marketing/uploads {
        # Rewrite path to remove /projects/internet-marketing prefix
        rewrite ^/projects/internet-marketing/(.*)$ /$1 break;

        proxy_pass http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static files
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Next.js Frontend - /projects/internet-marketing
    location /projects/internet-marketing {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js static files - /_next
    location ~ ^/projects/internet-marketing/_next/(.*)$ {
        proxy_pass http://127.0.0.1:3000/_next/$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache Next.js static files
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Your existing website (root location should be last)
    location / {
        # Your existing website configuration here
        root /var/www/test;
        index index.html index.htm;
        try_files $uri $uri/ =404;
    }
}
